# lambada-web reverse proxy: terminates port 80, proxies to lambada-web
# on 127.0.0.1:8080 (set LAMBADA_WEB_LISTEN_ADDR there once this is
# installed). LAN-only, no TLS. See docs/DEVELOPMENT.md "Reverse proxy
# (nginx)" for setup/rollback.
#
#   sudo cp service/lambada-web.nginx.conf /etc/nginx/sites-available/lambada-web
#   sudo ln -sf /etc/nginx/sites-available/lambada-web /etc/nginx/sites-enabled/lambada-web
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No upstream keepalive pool -- traffic here never needs it.
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
