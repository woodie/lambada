# lambada-web reverse proxy. Listens on port 80 (lambada-web itself only
# binds 127.0.0.1:8080 -- see cmd/lambada-web/main.go) and proxies
# everything to it over a stable local connection.
#
# Replaces the old iptables PREROUTING redirect (port 80 -> 8080) for two
# reasons: nginx's master process starts as root and can bind a
# privileged port directly, so the unprivileged Go binary no longer needs
# a NAT trick to receive traffic on 80; and it puts a battle-tested
# reverse proxy between lambada-web and whatever a real LAN client's
# connection does -- a laptop sleeping mid-request, a flaky Wi-Fi hop, a
# client reusing a stale keep-alive socket -- under investigation as the
# cause of an intermittent zouk connect hang. See issue #5 and
# docs/COWORK.md.
#
# No TLS, no public exposure -- this is LAN-only, same as before. Install
# with:
#   sudo cp service/lambada-web.nginx.conf /etc/nginx/sites-available/lambada-web
#   sudo ln -sf /etc/nginx/sites-available/lambada-web /etc/nginx/sites-enabled/lambada-web
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Rollback instructions are in docs/DEVELOPMENT.md if this ends up being
# more trouble than it's worth.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deliberately no upstream keepalive pool here -- traffic is a
        # handful of requests a week, so a fresh connection per request
        # to lambada-web is simpler than tuning an upstream{} block for
        # load this setup will never see.
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
