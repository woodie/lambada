name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  golangci-lint:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

  javascript:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      run: npm install # no package-lock.json committed, so npm ci isn't available
    - name: Lint
      run: npm run lint-js
    - name: Run tests
      run: npm run test-js
